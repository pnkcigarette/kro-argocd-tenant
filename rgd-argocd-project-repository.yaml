---
# ResourceGraphDefinition: ArgoCDProjectRepository
#
# A repo entry (per project) OR a tenant-level credential template.
# The team writes creds into their Vault namespace; the path depends on
# scope:
#
#   repository (project-scoped):  <mount>/<pathPrefix>/<tenant>/<project>/repos/<name>
#   repo-creds (tenant-scoped):   <mount>/<pathPrefix>/<tenant>/repo-creds/<name>
#     username / password        (https)
#     sshPrivateKey              (ssh)
#
# A VaultStaticSecret syncs that path into an Argo CD secret. Exactly one
# of five variants materializes (includeWhen on secretType x credType) so
# each secret carries only the keys that apply.
#
#   secretType=repository -> PROJECT-scoped repo entry (data.project =
#     <tenant>-<project>, project REQUIRED): even if a URL glob in some
#     other AppProject matched it, the credential is only usable by this
#     project. Secret repo-<tenant>-<project>-<name>.
#   secretType=repo-creds -> TENANT-level credential template for every
#     repo under the URL prefix (project FORBIDDEN — these are NOT
#     project-scoped in Argo CD; any project of the tenant whose
#     sourceRepos matches the prefix gets these creds). Only use
#     tenant-unique prefixes. Secret repo-creds-<tenant>-<name>; not
#     coupled to any project's lifecycle.
#   credType=none (repository only) -> metadata-only attachment, plain
#     Secret, no Vault: creds resolve from the tenant's repo-creds
#     template. Use it to attach an already-credentialed URL to a second
#     project without duplicating credentials.
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: argocdprojectrepository.kro.run
spec:
  schema:
    apiVersion: v1alpha1
    kind: ArgoCDProjectRepository
    spec:
      # tenant must match an ArgoCDProject's spec.tenant.
      tenant: string | required=true pattern="^[a-z0-9]([a-z0-9-]{0,28}[a-z0-9])?$"
      # project: REQUIRED for secretType=repository (the entry is
      # project-scoped, must match an ArgoCDProject's spec.name), and
      # FORBIDDEN for secretType=repo-creds (those are TENANT-scoped
      # credential templates matched by URL prefix — they serve every
      # project of the tenant, so tying them to one project is fiction
      # and wrongly couples their lifecycle to that project). Enforced by
      # platform-policies.yaml.
      project: string | pattern="^[a-z0-9]([a-z0-9-]{0,28}[a-z0-9])?$"
      # Short repo name, used in resource/secret names and the Vault path.
      name: string | required=true pattern="^[a-z0-9]([a-z0-9-]{0,28}[a-z0-9])?$"
      url: string | required=true
      # "repository" for a single project-scoped repo, "repo-creds" for a
      # TENANT-level credential template applied to every repo under the
      # URL prefix.
      secretType: string | default="repository" enum="repository,repo-creds"
      repoType: string | default="git" enum="git,helm"
      # Helm OCI registry (oci:// url). Argo CD models these as
      # type=helm + enableOCI, not a distinct repo type.
      enableOCI: boolean | default=false

      vault:
        # VaultAuth resource (in the argocd namespace) to authenticate with.
        authRef: string | default="vault-auth"
        # Team's Vault Enterprise namespace.
        namespace: string | required=true
        mount: string | default="kv"
        pathPrefix: string | default="argocd"
        refreshAfter: string | default="60s" pattern="^[0-9]+(s|m|h)$"

      # Which credential shape lives at the Vault path — or "none" for a
      # METADATA-ONLY project attachment: no credentials, no Vault block.
      # Argo CD project-scoped repo entries are 1:1 with an AppProject,
      # so attaching the same URL to a second project means a second
      # (lightweight) entry; with credType=none that entry carries no
      # secret material and credentials resolve from the tenant's
      # matching repo-creds template (tenant-unique URL prefix). One
      # credential in Vault, N project attachments.
      credType: string | default="https" enum="https,ssh,none"

    # NOTE: cross-field rules (credType/url agreement, oci modeling,
    # vault presence, identity immutability, dup checks) live in
    # platform-policies.yaml — KRO simple schema has no CEL block.
    #
    # No custom status: KRO status may only reference resources, and
    # which resource exists depends on the variant. The written Secret is
    # deterministic: repo-<tenant>-<project>-<name> in argocd.

  resources:
    # ------------------------------------------------------------------
    # repository + https
    # ------------------------------------------------------------------
    - id: repoHttps
      includeWhen:
        - ${schema.spec.secretType == "repository"}
        - ${schema.spec.credType == "https"}
      template:
        apiVersion: secrets.hashicorp.com/v1beta1
        kind: VaultStaticSecret
        metadata:
          name: repo-${schema.spec.tenant}-${schema.spec.project}-${schema.spec.name}
          namespace: argocd
          labels:
            example.com/tenant: ${schema.spec.tenant}
            example.com/project: ${schema.spec.project}
        spec:
          vaultAuthRef: ${schema.spec.vault.authRef}
          namespace: ${schema.spec.vault.namespace}
          mount: ${schema.spec.vault.mount}
          type: kv-v2
          path: ${schema.spec.vault.pathPrefix}/${schema.spec.tenant}/${schema.spec.project}/repos/${schema.spec.name}
          refreshAfter: ${schema.spec.vault.refreshAfter}
          hmacSecretData: true
          destination:
            name: repo-${schema.spec.tenant}-${schema.spec.project}-${schema.spec.name}
            create: true
            overwrite: true
            labels:
              argocd.argoproj.io/secret-type: repository
              example.com/tenant: ${schema.spec.tenant}
              example.com/project: ${schema.spec.project}
            transformation:
              excludes:
                - .*
              excludeRaw: true
              templates:
                name:
                  text: ${schema.spec.tenant}-${schema.spec.project}-${schema.spec.name}
                url:
                  text: ${schema.spec.url}
                type:
                  text: ${schema.spec.repoType}
                enableOCI:
                  text: ${string(schema.spec.enableOCI)}
                # Hard project scoping: Argo CD only lets the named
                # AppProject use this repository credential.
                project:
                  text: ${schema.spec.tenant}-${schema.spec.project}
                username:
                  text: '{{- get .Secrets "username" -}}'
                password:
                  text: '{{- get .Secrets "password" -}}'

    # ------------------------------------------------------------------
    # repository + ssh
    # ------------------------------------------------------------------
    - id: repoSsh
      includeWhen:
        - ${schema.spec.secretType == "repository"}
        - ${schema.spec.credType == "ssh"}
      template:
        apiVersion: secrets.hashicorp.com/v1beta1
        kind: VaultStaticSecret
        metadata:
          name: repo-${schema.spec.tenant}-${schema.spec.project}-${schema.spec.name}
          namespace: argocd
          labels:
            example.com/tenant: ${schema.spec.tenant}
            example.com/project: ${schema.spec.project}
        spec:
          vaultAuthRef: ${schema.spec.vault.authRef}
          namespace: ${schema.spec.vault.namespace}
          mount: ${schema.spec.vault.mount}
          type: kv-v2
          path: ${schema.spec.vault.pathPrefix}/${schema.spec.tenant}/${schema.spec.project}/repos/${schema.spec.name}
          refreshAfter: ${schema.spec.vault.refreshAfter}
          hmacSecretData: true
          destination:
            name: repo-${schema.spec.tenant}-${schema.spec.project}-${schema.spec.name}
            create: true
            overwrite: true
            labels:
              argocd.argoproj.io/secret-type: repository
              example.com/tenant: ${schema.spec.tenant}
              example.com/project: ${schema.spec.project}
            transformation:
              excludes:
                - .*
              excludeRaw: true
              templates:
                name:
                  text: ${schema.spec.tenant}-${schema.spec.project}-${schema.spec.name}
                url:
                  text: ${schema.spec.url}
                type:
                  text: ${schema.spec.repoType}
                project:
                  text: ${schema.spec.tenant}-${schema.spec.project}
                sshPrivateKey:
                  text: '{{- get .Secrets "sshPrivateKey" -}}'

    # ------------------------------------------------------------------
    # repo-creds + https — TENANT-level credential template (creds-only
    # keys; NOT project-scoped in Argo CD). Name/path/labels are
    # tenant-level: no project (it serves every project of the tenant
    # whose sourceRepos match the URL prefix). Vault path:
    #   <mount>/<pathPrefix>/<tenant>/repo-creds/<name>
    # ------------------------------------------------------------------
    - id: credsHttps
      includeWhen:
        - ${schema.spec.secretType == "repo-creds"}
        - ${schema.spec.credType == "https"}
      template:
        apiVersion: secrets.hashicorp.com/v1beta1
        kind: VaultStaticSecret
        metadata:
          name: repo-creds-${schema.spec.tenant}-${schema.spec.name}
          namespace: argocd
          labels:
            example.com/tenant: ${schema.spec.tenant}
        spec:
          vaultAuthRef: ${schema.spec.vault.authRef}
          namespace: ${schema.spec.vault.namespace}
          mount: ${schema.spec.vault.mount}
          type: kv-v2
          path: ${schema.spec.vault.pathPrefix}/${schema.spec.tenant}/repo-creds/${schema.spec.name}
          refreshAfter: ${schema.spec.vault.refreshAfter}
          hmacSecretData: true
          destination:
            name: repo-creds-${schema.spec.tenant}-${schema.spec.name}
            create: true
            overwrite: true
            labels:
              argocd.argoproj.io/secret-type: repo-creds
              example.com/tenant: ${schema.spec.tenant}
            transformation:
              excludes:
                - .*
              excludeRaw: true
              templates:
                url:
                  text: ${schema.spec.url}
                type:
                  text: ${schema.spec.repoType}
                enableOCI:
                  text: ${string(schema.spec.enableOCI)}
                username:
                  text: '{{- get .Secrets "username" -}}'
                password:
                  text: '{{- get .Secrets "password" -}}'

    # ------------------------------------------------------------------
    # repo-creds + ssh — TENANT-level (see credsHttps).
    # ------------------------------------------------------------------
    - id: credsSsh
      includeWhen:
        - ${schema.spec.secretType == "repo-creds"}
        - ${schema.spec.credType == "ssh"}
      template:
        apiVersion: secrets.hashicorp.com/v1beta1
        kind: VaultStaticSecret
        metadata:
          name: repo-creds-${schema.spec.tenant}-${schema.spec.name}
          namespace: argocd
          labels:
            example.com/tenant: ${schema.spec.tenant}
        spec:
          vaultAuthRef: ${schema.spec.vault.authRef}
          namespace: ${schema.spec.vault.namespace}
          mount: ${schema.spec.vault.mount}
          type: kv-v2
          path: ${schema.spec.vault.pathPrefix}/${schema.spec.tenant}/repo-creds/${schema.spec.name}
          refreshAfter: ${schema.spec.vault.refreshAfter}
          hmacSecretData: true
          destination:
            name: repo-creds-${schema.spec.tenant}-${schema.spec.name}
            create: true
            overwrite: true
            labels:
              argocd.argoproj.io/secret-type: repo-creds
              example.com/tenant: ${schema.spec.tenant}
            transformation:
              excludes:
                - .*
              excludeRaw: true
              templates:
                url:
                  text: ${schema.spec.url}
                type:
                  text: ${schema.spec.repoType}
                sshPrivateKey:
                  text: '{{- get .Secrets "sshPrivateKey" -}}'

    # ------------------------------------------------------------------
    # repository + none — metadata-only attachment: a plain Secret with
    # no credential keys and NO Vault involvement. Credentials resolve
    # from the tenant's matching repo-creds template. This is the
    # "add an existing repo to a second project" path.
    # ------------------------------------------------------------------
    - id: repoNone
      includeWhen:
        - ${schema.spec.secretType == "repository"}
        - ${schema.spec.credType == "none"}
      template:
        apiVersion: v1
        kind: Secret
        metadata:
          name: repo-${schema.spec.tenant}-${schema.spec.project}-${schema.spec.name}
          namespace: argocd
          labels:
            argocd.argoproj.io/secret-type: repository
            example.com/tenant: ${schema.spec.tenant}
            example.com/project: ${schema.spec.project}
        type: Opaque
        stringData:
          name: ${schema.spec.tenant}-${schema.spec.project}-${schema.spec.name}
          url: ${schema.spec.url}
          type: ${schema.spec.repoType}
          enableOCI: ${string(schema.spec.enableOCI)}
          # Hard project scoping: this entry attaches the URL to exactly
          # this AppProject.
          project: ${schema.spec.tenant}-${schema.spec.project}
