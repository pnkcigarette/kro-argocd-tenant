---
# Platform-level guardrails, applied once (not per project).
# Kyverno ValidatingPolicy (policies.kyverno.io/v1, verified on Kyverno
# v1.18) — the Kubernetes ValidatingAdmissionPolicy CEL spec plus
# Kyverno's CEL libraries (resource.List for the claim registry).
#
# Vocabulary: TENANT = org/team rollup (example.com/tenant label);
# PROJECT = onboarding unit (example.com/project label); the unit string
# "<tenant>-<name>" names the AppProject; the source namespace is
# "tenant-<tenant>-<name>". Clusters are GLOBAL (ArgoCDCluster) — shared
# across projects, with per-namespace ownership enforced by the claims
# registry.
#
# Kyverno CEL gotchas (verified live):
#   - variables.* are typed 'any'; wrap in dyn() before comprehensions
#   - every UPDATE-matching policy carries a not-being-deleted
#     matchCondition, or finalizer-removal UPDATEs deadlock deletion
#   - spec-validating policies on KRO kinds carry create-or-spec-changed:
#     KRO's labeller server-side-applies METADATA to the main resource on
#     reconcile, which would otherwise re-deny grandfathered instances
#   - CRD plurals come from KRO's pluralizer and can surprise (Repo ->
#     repoes; hence the kind is named ...Repository) — check
#     `kubectl get crd | grep kro.run` before writing one; a wrong plural
#     fails SILENTLY
#
#   argocd-project-binding        — apps/appsets in project namespaces
#                                   must bind to the project's AppProject
#                                   (failurePolicy Ignore: Argo CD
#                                   sourceNamespaces is the hard enforcer)
#   argocd-appproject-guard       — sourceNamespaces invariant on all
#                                   AppProjects, bound to the label pair
#   argocd-project-namespace-guard— tenant-* namespaces must carry the
#                                   matching tenant/project labels
#   argocd-project-destination-guard — shape, denylist, prefix-adjacent
#                                   field rules, identity immutability
#   argocd-project-claims         — cross-project uniqueness of
#                                   destination + source namespace claims,
#                                   cluster existence, tenant- prefix
#   argocd-project-repo-field-guard   — repo cross-field + dup + identity
#   argocd-cluster-field-guard    — cluster provider rules, one-per-server,
#                                   name/server immutability, label guard
#   argocd-referential-guard      — DELETE-time referential integrity
#                                   (offboarding order), failurePolicy
#                                   Ignore
#
# All policies EXCEPT project-binding and referential-guard are
# failurePolicy Fail (fail closed). See the preflight gate in the README.

# Defense-in-depth for the Argo CD binding rule, and a readable failure
# at admission instead of an app stuck in an error state. Matches by the
# tenant/project namespace labels (the RGD labels the derived namespace;
# label any extraSourceNamespaces at approval time).
#
# failurePolicy: Ignore — this matches every Application/ApplicationSet
# write in project namespaces, the hottest admission path. Argo CD's own
# sourceNamespaces check is the HARD enforcer; a Kyverno outage must not
# block tenant app deploys.
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: argocd-project-binding
spec:
  validationActions: [Deny]
  failurePolicy: Ignore
  matchConditions:
    - name: not-being-deleted
      expression: '!has(object.metadata.deletionTimestamp)'
  matchConstraints:
    namespaceSelector:
      matchExpressions:
        - key: example.com/tenant
          operator: Exists
        - key: example.com/project
          operator: Exists
    resourceRules:
      - apiGroups: ["argoproj.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["applications", "applicationsets"]
  variables:
    - name: requiredProject
      expression: >-
        namespaceObject.metadata.labels['example.com/tenant'] + '-' +
        namespaceObject.metadata.labels['example.com/project']
  validations:
    - expression: >-
        object.kind != 'Application' ||
        (has(object.spec.project) && object.spec.project == variables.requiredProject)
      messageExpression: >-
        'Applications in this namespace must set spec.project=' + variables.requiredProject
    - expression: >-
        object.kind != 'ApplicationSet' ||
        (has(object.spec.template.spec.project) &&
         object.spec.template.spec.project == variables.requiredProject)
      messageExpression: >-
        'ApplicationSets in this namespace must template spec.project=' + variables.requiredProject
---
# The tenancy model rests on: an Application in namespace X can only use
# AppProject P if P.sourceNamespaces contains X, and each project source
# namespace is listed by exactly ONE AppProject. This keeps the second
# half true.
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: argocd-appproject-guard
spec:
  validationActions: [Deny]
  failurePolicy: Fail
  matchConditions:
    - name: not-being-deleted
      expression: '!has(object.metadata.deletionTimestamp)'
    # This guard reads spec AND metadata.labels, so it must re-run on a
    # label change too; a stable KRO relabel (no actual change) is
    # skipped.
    - name: create-or-spec-or-label-changed
      expression: >-
        request.operation == 'CREATE' || object.spec != oldObject.spec ||
        object.metadata.labels != oldObject.metadata.labels
  matchConstraints:
    resourceRules:
      - apiGroups: ["argoproj.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["appprojects"]
  variables:
    - name: hasTenant
      expression: >-
        has(object.metadata.labels) && 'example.com/tenant' in object.metadata.labels
    - name: hasProject
      expression: >-
        has(object.metadata.labels) && 'example.com/project' in object.metadata.labels
    - name: isProjectManaged
      expression: variables.hasTenant && variables.hasProject
    - name: sourceNamespaces
      expression: >-
        has(object.spec.sourceNamespaces) ? object.spec.sourceNamespaces : []
    - name: destinations
      expression: >-
        has(object.spec.destinations) ? object.spec.destinations : []
    - name: projects
      expression: >-
        resource.List("kro.run/v1alpha1", "argocdprojects", "").items
    - name: tenantLabel
      expression: >-
        variables.isProjectManaged ? object.metadata.labels['example.com/tenant'] : ''
    - name: projectLabel
      expression: >-
        variables.isProjectManaged ? object.metadata.labels['example.com/project'] : ''
  validations:
    # Half-labeled is malformed — either both tenancy labels or neither.
    - expression: variables.hasTenant == variables.hasProject
      message: >-
        an AppProject must carry both example.com/tenant and
        example.com/project labels, or neither
    # sourceNamespaces entries are GLOBS ('t*', '*ant-*', '[t]enant-x'
    # all match tenant namespaces without literally starting with
    # 'tenant'), so reject glob metacharacters outright.
    - expression: >-
        dyn(variables.sourceNamespaces).all(ns,
          !ns.contains('*') && !ns.contains('?') && !ns.contains('['))
      message: >-
        AppProject sourceNamespaces must be explicit namespace names —
        glob patterns could cover tenant namespaces
    - expression: >-
        variables.isProjectManaged
          ? dyn(variables.sourceNamespaces).all(ns, ns.startsWith('tenant-'))
          : dyn(variables.sourceNamespaces).all(ns, !ns.startsWith('tenant'))
      message: >-
        only RGD-managed AppProjects may list tenant-* source namespaces;
        other AppProjects must not cover tenant namespaces
    # Bind a labeled AppProject's namespaces to its OWN label pair. The
    # derived-namespace branch needs no instance lookup, so a fresh
    # onboarding isn't informer-timing dependent; only extras require the
    # ArgoCDProject to be listable (and those were validated at its own
    # admission).
    - expression: >-
        !variables.isProjectManaged ||
        dyn(variables.sourceNamespaces).all(ns,
          ns == 'tenant-' + object.metadata.labels['example.com/tenant'] + '-' +
                object.metadata.labels['example.com/project'] ||
          dyn(variables.projects).exists(x,
            x.spec.tenant == object.metadata.labels['example.com/tenant'] &&
            x.spec.name == object.metadata.labels['example.com/project'] &&
            has(x.spec.extraSourceNamespaces) && ns in x.spec.extraSourceNamespaces))
      message: >-
        an AppProject may only list namespaces belonging to the project in
        its example.com/tenant + example.com/project labels
    # DESTINATIONS must match the claims registry too. The claims policy
    # runs on the ArgoCDProject CR, but the AppProject is the object Argo
    # CD actually reads — so a direct AppProject edit could otherwise add
    # a cross-tenant destination that the claims registry never saw
    # (KRO reverts the drift, but this closes the window). Every
    # destination namespace must be the project's own source namespace or
    # a namespace the owning ArgoCDProject claims (match by namespace —
    # claims are globally unique per namespace, so the cluster side is
    # implied). Covers both the name-form and server-form in-cluster
    # entries (same namespace); destinationServiceAccounts is a separate
    # field. Transient: right after a claim change KRO re-renders the
    # AppProject, and if Kyverno's informer hasn't yet seen the updated
    # ArgoCDProject the apply is briefly denied and KRO retries to
    # convergence — the same informer-lag we accept for claims.
    - expression: >-
        !variables.isProjectManaged ||
        dyn(variables.destinations).all(d,
          !has(d.namespace) ||
          d.namespace == 'tenant-' + variables.tenantLabel + '-' + variables.projectLabel ||
          dyn(variables.projects).exists(x,
            x.spec.tenant == variables.tenantLabel &&
            x.spec.name == variables.projectLabel &&
            (has(x.spec.destinations) ? x.spec.destinations : [])
              .exists(cd, cd.split('/')[1] == d.namespace)))
      message: >-
        an AppProject destination namespace must be the project's source
        namespace or a namespace the owning ArgoCDProject claims — direct
        AppProject destination edits that bypass the claim registry are
        rejected
---
# Protect the namespace boundary itself: tenant-* namespaces must carry
# the label pair that binds them to their project — the binding policy is
# label-matched, so an unlabeled/mislabeled tenant-* namespace would
# evade it (backstopped only by Argo CD). tenant-* is a RESERVED prefix.
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: argocd-project-namespace-guard
spec:
  validationActions: [Deny]
  failurePolicy: Fail
  # Background eval surfaces pre-existing mislabeled namespaces. No
  # spec-change gate: this validates metadata.labels, which KRO's
  # relabel applies re-affirm rather than trip.
  evaluation:
    admission:
      enabled: true
    background:
      enabled: true
  matchConditions:
    - name: not-being-deleted
      expression: '!has(object.metadata.deletionTimestamp)'
    - name: is-tenant-namespace
      expression: "object.metadata.name.startsWith('tenant-')"
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["namespaces"]
  validations:
    - expression: >-
        has(object.metadata.labels) &&
        'example.com/tenant' in object.metadata.labels &&
        'example.com/project' in object.metadata.labels &&
        object.metadata.name == 'tenant-' +
          object.metadata.labels['example.com/tenant'] + '-' +
          object.metadata.labels['example.com/project']
      message: >-
        a tenant-* namespace must be named tenant-<tenant>-<project> and
        carry matching example.com/tenant + example.com/project labels
        (create project namespaces via an ArgoCDProject; do not remove
        the labels)
---
# Field rules + identity immutability for ArgoCDProject instances.
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: argocd-project-destination-guard
spec:
  validationActions: [Deny]
  failurePolicy: Fail
  matchConditions:
    - name: not-being-deleted
      expression: '!has(object.metadata.deletionTimestamp)'
    # Skip re-validation on a spec-unchanged UPDATE (KRO labeller applies
    # metadata to the main resource on reconcile).
    - name: create-or-spec-changed
      expression: "request.operation == 'CREATE' || object.spec != oldObject.spec"
  matchConstraints:
    resourceRules:
      - apiGroups: ["kro.run"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["argocdprojects"]
  validations:
    # tenant+name are the identity — they name the AppProject and the
    # source namespace. Renaming makes KRO's applyset prune-and-recreate
    # (destroying the project's namespace + workloads). Immutable.
    - expression: >-
        request.operation != 'UPDATE' ||
        (object.spec.tenant == oldObject.spec.tenant &&
         object.spec.name == oldObject.spec.name)
      message: >-
        ArgoCDProject spec.tenant/spec.name are immutable (renaming would
        delete the project's namespace and AppProject) — delete and
        recreate instead
    # Source namespace must fit a DNS label: "tenant-"+t+"-"+n <= 63.
    - expression: >-
        (object.spec.tenant + object.spec.name).size() <= 55
      message: >-
        tenant + name too long — "tenant-<tenant>-<name>" must fit in 63
        characters
    # Destinations are explicit claims: "<clusterName>/<namespace>", no
    # glob metacharacters (Argo CD treats destination namespaces as
    # globs — 'pay-[ab]' would match pay-a/pay-b without the claim
    # registry seeing the overlap), and the namespace must fit DNS.
    - expression: >-
        (has(object.spec.destinations) ? object.spec.destinations : [])
          .all(d, d.split('/').size() == 2 && d.split('/')[0] != '' && d.split('/')[1] != ''
                  && !d.contains('*') && !d.contains('?') && !d.contains('[')
                  && d.split('/')[1].size() <= 63)
      message: >-
        destinations must be "<clusterName>/<namespace>" — explicit
        namespace claims, no glob metacharacters, namespace <= 63 chars
    # Denylist belt for ALL clusters (external ones can't be inspected
    # from the hub). The prefix/positive-claim checks live in
    # argocd-project-claims.
    - expression: >-
        (has(object.spec.destinations) ? object.spec.destinations : [])
          .filter(d, d.split('/').size() == 2)
          .all(d,
            d.split('/')[1] == 'tenant-' + object.spec.tenant + '-' + object.spec.name ||
            (!(d.split('/')[1] in ['default', 'argocd', 'kro', 'kyverno',
                                   'vault-secrets-operator']) &&
             !d.split('/')[1].startsWith('kube-') &&
             !d.split('/')[1].startsWith('tenant-')))
      message: >-
        destinations must not target platform/system namespaces or other
        projects' source namespaces
    # Extras metacharacter set matches the appproject-guard exactly.
    - expression: >-
        (has(object.spec.extraSourceNamespaces) ? object.spec.extraSourceNamespaces : [])
          .all(ns, ns.startsWith('tenant-') &&
               !ns.contains('*') && !ns.contains('?') && !ns.contains('['))
      message: >-
        extraSourceNamespaces must start with tenant- (no glob
        metacharacters) so they are covered by the Argo CD
        apps-in-any-namespace glob
    - expression: >-
        (has(object.spec.sourceRepos) ? object.spec.sourceRepos : [])
          .all(r, r.startsWith('https://') || r.startsWith('git@') ||
                  r.startsWith('ssh://') || r.startsWith('oci://'))
      message: sourceRepos entries must be https://, git@, ssh://, or oci:// URLs/globs
    - expression: >-
        (has(object.spec.clusterResourceWhitelist) ? object.spec.clusterResourceWhitelist : [])
          .all(gk, gk.split('/').size() == 2 && gk.split('/')[1] != '')
      message: clusterResourceWhitelist entries must be "group/Kind" (empty group as "/Kind")
    # Bootstrap sanity: url scheme, and the path must be relative.
    - expression: >-
        !has(object.spec.bootstrap) || object.spec.bootstrap.repoUrl == '' ||
        (object.spec.bootstrap.repoUrl.startsWith('https://') ||
         object.spec.bootstrap.repoUrl.startsWith('git@') ||
         object.spec.bootstrap.repoUrl.startsWith('ssh://'))
      message: bootstrap.repoUrl must be an https://, git@, or ssh:// URL
    # Tool knobs are mutually exclusive: helmValueFiles forces the Helm
    # tool, recurse forces the plain-directory tool.
    - expression: >-
        !has(object.spec.bootstrap) ||
        !(has(object.spec.bootstrap.helmValueFiles) &&
          object.spec.bootstrap.helmValueFiles.size() > 0 &&
          has(object.spec.bootstrap.recurse) && object.spec.bootstrap.recurse)
      message: >-
        bootstrap.helmValueFiles and bootstrap.recurse are mutually
        exclusive (helm chart vs plain-manifest directory)
    # valueFiles are in-repo relative paths (Argo CD enforces the repo
    # boundary; we reject the obviously-wrong shapes early).
    - expression: >-
        !has(object.spec.bootstrap) || !has(object.spec.bootstrap.helmValueFiles) ||
        object.spec.bootstrap.helmValueFiles.all(v,
          v != '' && !v.startsWith('/') && !v.contains('\\'))
      message: >-
        bootstrap.helmValueFiles entries must be non-empty relative paths
---
# Destination and source namespaces are ownership claims. Clusters are
# GLOBAL and registered exactly once per server, so the claim key is the
# literal "<clusterName>/<namespace>" string — no server canonicalization
# needed (one-per-server is enforced by the cluster field guard).
#
# First come first claimed; disputes are settled in PR review of the
# project instances, not at deploy time. New destination namespaces must
# be prefixed "<tenant>-" (stops cross-team squatting on generic names
# like "dev"); pre-existing hub namespaces go through the
# example.com/tenant-deployable label (brownfield approval).
#
# ORDERING: this policy resource.List's argocdprojects, argocdclusters,
# and namespaces. All RGD CRDs must be established BEFORE this policy, or
# every ArgoCDProject write fails closed with a lookup error.
#
# Admission checks race under concurrent writes (informer cache), so
# background evaluation is the detector: conflicts that slip a race
# surface in PolicyReports.
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: argocd-project-claims
spec:
  validationActions: [Deny]
  failurePolicy: Fail
  evaluation:
    admission:
      enabled: true
    background:
      enabled: true
  matchConditions:
    - name: not-being-deleted
      expression: '!has(object.metadata.deletionTimestamp)'
    - name: create-or-spec-changed
      expression: "request.operation == 'CREATE' || object.spec != oldObject.spec"
  matchConstraints:
    resourceRules:
      - apiGroups: ["kro.run"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["argocdprojects"]
  variables:
    - name: allProjects
      expression: >-
        resource.List("kro.run/v1alpha1", "argocdprojects", "").items
    - name: otherProjects
      expression: >-
        dyn(variables.allProjects).filter(x,
          x.spec.tenant != object.spec.tenant || x.spec.name != object.spec.name)
    - name: clusterList
      expression: >-
        resource.List("kro.run/v1alpha1", "argocdclusters", "").items
    - name: hubNamespaces
      expression: >-
        resource.List("v1", "namespaces", "").items
    # Well-formed destinations only — malformed shapes get the friendly
    # error from the destination-guard, not a CEL index error.
    - name: requestedDests
      expression: >-
        (has(object.spec.destinations) ? object.spec.destinations : [])
          .filter(d, d.split('/').size() == 2)
    - name: srcNs
      expression: >-
        'tenant-' + object.spec.tenant + '-' + object.spec.name
    - name: requestedSourceNs
      expression: >-
        [variables.srcNs] +
        (has(object.spec.extraSourceNamespaces) ? object.spec.extraSourceNamespaces : [])
  validations:
    # A project is defined by exactly one instance.
    - expression: >-
        !dyn(variables.allProjects).exists(x,
          x.spec.tenant == object.spec.tenant && x.spec.name == object.spec.name &&
          (x.metadata.name != object.metadata.name ||
           x.metadata.namespace != object.metadata.namespace))
      message: >-
        another ArgoCDProject instance already defines this tenant/name
    # Destination clusters must exist (in-cluster excepted) — clusters
    # are platform-registered ahead of project onboarding.
    - expression: >-
        dyn(variables.requestedDests).all(d,
          d.split('/')[0] == 'in-cluster' ||
          dyn(variables.clusterList).exists(c, c.spec.name == d.split('/')[0]))
      message: >-
        destination references an unregistered cluster — register the
        ArgoCDCluster first (or use in-cluster)
    # Namespace claims: a "<cluster>/<namespace>" string belongs to at
    # most one project, siblings included.
    - expression: >-
        !dyn(variables.requestedDests).exists(d,
          dyn(variables.otherProjects).exists(x,
            (has(x.spec.destinations) ? x.spec.destinations : []).exists(od, od == d)))
      message: >-
        one or more destination namespaces are already claimed by another
        project
    # New destination namespaces must carry the tenant prefix (stops
    # cross-team squatting on generic names); the project's own source
    # namespace is always allowed; pre-existing hub namespaces are
    # allowed via the brownfield approval label.
    - expression: >-
        dyn(variables.requestedDests).all(d,
          d.split('/')[1].startsWith(object.spec.tenant + '-') ||
          d.split('/')[1] == variables.srcNs ||
          (d.split('/')[0] == 'in-cluster' &&
           dyn(variables.hubNamespaces).exists(n,
             n.metadata.name == d.split('/')[1] &&
             has(n.metadata.labels) &&
             'example.com/tenant-deployable' in n.metadata.labels &&
             n.metadata.labels['example.com/tenant-deployable'] == 'true')))
      message: >-
        destination namespaces must be prefixed "<tenant>-" (e.g.
        teamx-dev, not dev); pre-existing namespaces need the
        example.com/tenant-deployable="true" label (platform approval)
    # An in-cluster destination namespace that ALREADY EXISTS must be
    # recognizably this tenant's (prefix or own source ns) or carry the
    # brownfield approval label — platform namespaces are protected by
    # default instead of relying on the denylist keeping up.
    - expression: >-
        dyn(variables.requestedDests)
          .filter(d, d.split('/')[0] == 'in-cluster')
          .all(d,
            !dyn(variables.hubNamespaces).exists(n, n.metadata.name == d.split('/')[1]) ||
            d.split('/')[1] == variables.srcNs ||
            d.split('/')[1].startsWith(object.spec.tenant + '-') ||
            dyn(variables.hubNamespaces).exists(n,
              n.metadata.name == d.split('/')[1] &&
              has(n.metadata.labels) &&
              'example.com/tenant-deployable' in n.metadata.labels &&
              n.metadata.labels['example.com/tenant-deployable'] == 'true'))
      message: >-
        an existing in-cluster destination namespace must belong to this
        tenant or be labeled example.com/tenant-deployable="true"
    # Source namespaces (derived or extra) belong to exactly one project.
    - expression: >-
        !dyn(variables.requestedSourceNs).exists(ns,
          dyn(variables.otherProjects).exists(x,
            ns == 'tenant-' + x.spec.tenant + '-' + x.spec.name ||
            (has(x.spec.extraSourceNamespaces) && ns in x.spec.extraSourceNamespaces)))
      message: >-
        one or more source namespaces (derived or extra) are already
        claimed by another project
---
# Cross-field rules for ArgoCDProjectRepository — KRO simple schema has no CEL
# validation block.
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: argocd-project-repo-field-guard
spec:
  validationActions: [Deny]
  failurePolicy: Fail
  # Background eval surfaces pre-existing duplicate/invalid instances.
  evaluation:
    admission:
      enabled: true
    background:
      enabled: true
  matchConditions:
    - name: not-being-deleted
      expression: '!has(object.metadata.deletionTimestamp)'
    - name: create-or-spec-changed
      expression: "request.operation == 'CREATE' || object.spec != oldObject.spec"
  matchConstraints:
    resourceRules:
      - apiGroups: ["kro.run"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["argocdprojectrepositories"]
  variables:
    - name: repoList
      expression: >-
        resource.List("kro.run/v1alpha1", "argocdprojectrepositories", "").items
  validations:
    # tenant+project+name are the identity: they name the Argo CD Secret
    # and the Vault path. Immutable.
    - expression: >-
        request.operation != 'UPDATE' ||
        (object.spec.tenant == oldObject.spec.tenant &&
         object.spec.project == oldObject.spec.project &&
         object.spec.name == oldObject.spec.name)
      message: >-
        ArgoCDProjectRepository spec.tenant/spec.project/spec.name are immutable
        (renaming orphans the repo secret) — delete and recreate instead
    # The vault block itself must be present — nested required= markers
    # only apply when the parent object exists. credType=none is the
    # exception: metadata-only attachments have no Vault involvement at
    # all, so the block is forbidden there (silent-ignore is a
    # misconfiguration).
    - expression: >-
        object.spec.credType == 'none' ||
        (has(object.spec.vault) && object.spec.vault.namespace != '')
      message: vault.namespace (the team's Vault namespace) is required
    - expression: >-
        object.spec.credType != 'none' || !has(object.spec.vault)
      message: vault.* may not be set when credType=none (metadata-only attachment)
    # none is a project ATTACHMENT — meaningless for repo-creds
    # templates, whose whole job is carrying the credential.
    - expression: >-
        object.spec.credType != 'none' || object.spec.secretType == 'repository'
      message: credType=none is only usable with secretType=repository
    - expression: >-
        object.spec.credType != 'none' ||
        object.spec.url.startsWith('https://') || object.spec.url.startsWith('oci://') ||
        object.spec.url.startsWith('git@') || object.spec.url.startsWith('ssh://')
      message: credType=none requires an https://, oci://, git@, or ssh:// url
    # One instance per (tenant, project, name).
    - expression: >-
        !dyn(variables.repoList).exists(r,
          r.spec.tenant == object.spec.tenant &&
          r.spec.project == object.spec.project &&
          r.spec.name == object.spec.name &&
          (r.metadata.name != object.metadata.name ||
           r.metadata.namespace != object.metadata.namespace))
      message: another ArgoCDProjectRepository instance already defines this tenant/project/name
    - expression: >-
        object.spec.credType != 'https' ||
        object.spec.url.startsWith('https://') || object.spec.url.startsWith('oci://')
      message: credType=https requires an https:// (or oci://) url
    - expression: >-
        object.spec.credType != 'ssh' ||
        object.spec.url.startsWith('git@') || object.spec.url.startsWith('ssh://')
      message: credType=ssh requires a git@ or ssh:// url
    - expression: >-
        !object.spec.url.startsWith('oci://') ||
        (object.spec.repoType == 'helm' && object.spec.enableOCI)
      message: oci:// urls require repoType=helm and enableOCI=true
    - expression: >-
        !object.spec.enableOCI || object.spec.repoType == 'helm'
      message: enableOCI only applies to repoType=helm
---
# Cross-field rules for GLOBAL ArgoCDCluster instances.
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: argocd-cluster-field-guard
spec:
  validationActions: [Deny]
  failurePolicy: Fail
  evaluation:
    admission:
      enabled: true
    background:
      enabled: true
  matchConditions:
    - name: not-being-deleted
      expression: '!has(object.metadata.deletionTimestamp)'
    - name: create-or-spec-changed
      expression: "request.operation == 'CREATE' || object.spec != oldObject.spec"
  matchConstraints:
    resourceRules:
      - apiGroups: ["kro.run"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["argocdclusters"]
  variables:
    - name: clusterDupList
      expression: >-
        resource.List("kro.run/v1alpha1", "argocdclusters", "").items
  validations:
    # name and server are the identity the claim registry keys on. name
    # is always immutable. server is immutable with ONE sanctioned
    # transition: migrating a credentialed cluster to argocd-agent in
    # place (provider -> agent, server -> the synthetic URL). The name —
    # and therefore every project claim/destination — is unchanged, so
    # the migration is invisible to tenants. The reverse (agent ->
    # credentialed) is NOT sanctioned: delete and re-register.
    - expression: >-
        request.operation != 'UPDATE' || object.spec.name == oldObject.spec.name
      message: >-
        ArgoCDCluster spec.name is immutable — delete and re-register to
        change it
    - expression: >-
        request.operation != 'UPDATE' ||
        object.spec.server == oldObject.spec.server ||
        (object.spec.provider == 'agent' && oldObject.spec.provider != 'agent' &&
         object.spec.server == 'https://' + object.spec.name + '.agent.internal')
      message: >-
        ArgoCDCluster spec.server is immutable (the only in-place change
        allowed is migrating to provider=agent with the synthetic
        server) — delete and re-register otherwise
    # host:port only (no trailing slash/path): URL-format variance would
    # alias one physical cluster into two claim keys. Scoped to
    # CREATE-or-server-changed so a grandfathered bad value can't wedge
    # unrelated updates (server is immutable and uncorrectable in place).
    - expression: >-
        (request.operation == 'UPDATE' && object.spec.server == oldObject.spec.server) ||
        (object.spec.server.startsWith('https://') &&
         !object.spec.server.substring(8).contains('/'))
      message: >-
        ArgoCDCluster.spec.server must be host:port only (https://, no
        trailing slash or path)
    # One registration per physical cluster (name AND normalized server) —
    # this is what lets the claim registry compare by name alone.
    - expression: >-
        !dyn(variables.clusterDupList).exists(c,
          (c.spec.name == object.spec.name ||
           c.spec.server.lowerAscii() == object.spec.server.lowerAscii()) &&
          (c.metadata.name != object.metadata.name ||
           c.metadata.namespace != object.metadata.namespace))
      message: >-
        another ArgoCDCluster already registers this name or server —
        clusters are global and registered exactly once
    # Provider/block agreement. Blocks carry no schema defaults, so
    # presence itself is meaningful: required for the matching provider,
    # forbidden otherwise.
    - expression: >-
        object.spec.provider != 'eks' ||
        (has(object.spec.eks) && has(object.spec.eks.clusterName) &&
         object.spec.eks.clusterName != '' && has(object.spec.eks.roleARN))
      message: provider=eks requires eks.clusterName and eks.roleARN
    - expression: >-
        object.spec.provider == 'eks' || !has(object.spec.eks)
      message: eks.* may only be set when provider=eks
    - expression: >-
        object.spec.provider != 'aks' ||
        (has(object.spec.aks) && has(object.spec.aks.environment))
      message: provider=aks requires aks.environment
    - expression: >-
        object.spec.provider == 'aks' || !has(object.spec.aks)
      message: aks.* may only be set when provider=aks
    - expression: >-
        object.spec.provider != 'generic' ||
        (has(object.spec.vault) && object.spec.vault.namespace != '')
      message: provider=generic requires vault.namespace (the platform Vault namespace)
    - expression: >-
        object.spec.provider == 'generic' || !has(object.spec.vault)
      message: vault.* may only be set when provider=generic (eks/aks use ambient pod identity)
    # agent clusters are registry-only: spec.name IS the agent name the
    # principal routes AppProjects to (destination-based mapping); the
    # server is a synthetic collision-free URL so one-per-server and
    # immutability rules hold; no secret material of any kind here
    # (argocd-agentctl owns the principal-side cluster secret, including
    # generator labels).
    - expression: >-
        object.spec.provider != 'agent' ||
        (has(object.spec.agent) && has(object.spec.agent.mode))
      message: provider=agent requires agent.mode (managed or autonomous)
    - expression: >-
        object.spec.provider == 'agent' || !has(object.spec.agent)
      message: agent.* may only be set when provider=agent
    - expression: >-
        object.spec.provider != 'agent' ||
        object.spec.server == 'https://' + object.spec.name + '.agent.internal'
      message: >-
        agent clusters must use the synthetic server
        https://<name>.agent.internal (agents dial out; the hub never
        connects to this URL)
    - expression: >-
        object.spec.provider != 'agent' || !has(object.spec.labels)
      message: >-
        spec.labels are ignored for agent clusters (argocd-agentctl owns
        the principal-side cluster secret) — set generator labels there
    # eks/aks API certs chain to the cluster's private CA.
    - expression: >-
        !(object.spec.provider in ['eks', 'aks']) || object.spec.caData != ''
      message: provider=eks/aks requires caData (base64 CA bundle of the target cluster)
    - expression: >-
        object.spec.provider in ['eks', 'aks'] || object.spec.caData == ''
      message: caData may only be set for eks/aks (generic carries its CA in the Vault config JSON)
    # User labels merge into the cluster secret (generator selectors);
    # reserved prefixes would let a registration spoof tenancy/identity
    # keys. Platform keys win on merge regardless — this makes the
    # attempt a loud error instead of a silent override.
    - expression: >-
        !has(object.spec.labels) ||
        object.spec.labels.all(k,
          !k.startsWith('argocd.argoproj.io/') && !k.startsWith('example.com/') &&
          !k.startsWith('kro.run/'))
      message: >-
        spec.labels may not use reserved prefixes (argocd.argoproj.io/,
        example.com/, kro.run/)
---
# Referential integrity on DELETE (day-2 offboarding).
#   - an ArgoCDProject can't be deleted while any ArgoCDProjectRepository of
#     the same tenant/project still exists (delete children first, or
#     their credential secrets are orphaned)
#   - an ArgoCDCluster can't be deleted while any ArgoCDProject still
#     lists it in destinations (clusters are shared infra — a delete
#     would dangle every referencing project). No deadlock: clusters are
#     not children of projects.
#
# On DELETE the admitted object is `oldObject` (`object` is null).
# failurePolicy Ignore: teardown must not be blocked by a Kyverno outage
# (hygiene, not a security boundary).
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: argocd-referential-guard
spec:
  validationActions: [Deny]
  failurePolicy: Ignore
  matchConstraints:
    resourceRules:
      - apiGroups: ["kro.run"]
        apiVersions: ["v1alpha1"]
        operations: ["DELETE"]
        resources: ["argocdprojects", "argocdclusters"]
  variables:
    - name: repoList
      expression: resource.List("kro.run/v1alpha1", "argocdprojectrepositories", "").items
    - name: projectList
      expression: resource.List("kro.run/v1alpha1", "argocdprojects", "").items
  validations:
    - expression: >-
        oldObject.kind != 'ArgoCDProject' ||
        !dyn(variables.repoList).exists(r,
          r.spec.tenant == oldObject.spec.tenant &&
          r.spec.project == oldObject.spec.name)
      message: >-
        delete this project's ArgoCDProjectRepository instances first — deleting
        the project now would orphan their Argo CD secrets
    - expression: >-
        oldObject.kind != 'ArgoCDCluster' ||
        !dyn(variables.projectList).exists(x,
          (has(x.spec.destinations) ? x.spec.destinations : [])
            .exists(d, d.split('/')[0] == oldObject.spec.name))
      message: >-
        one or more ArgoCDProjects still list this cluster in their
        destinations — remove those destinations before deleting the
        cluster
---
# Lets Kyverno run the resource.List lookups — the admission controller
# at admission time, the reports controller for background scans.
# Aggregates via the rbac.kyverno.io/aggregate-to-* selectors on Kyverno
# 1.11+ charts; the app.kubernetes.io trio covers older charts (adjust
# instance if your release isn't named "kyverno").
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno:aggregate-to-admission-controller:argocdprojects
  labels:
    rbac.kyverno.io/aggregate-to-admission-controller: "true"
    rbac.kyverno.io/aggregate-to-reports-controller: "true"
    app.kubernetes.io/part-of: kyverno
    app.kubernetes.io/instance: kyverno
    app.kubernetes.io/component: admission-controller
rules:
  - apiGroups: ["kro.run"]
    resources: ["argocdprojects", "argocdclusters", "argocdprojectrepositories"]
    verbs: ["get", "list", "watch"]
  # For the brownfield/positive claim checks on existing hub namespaces.
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  # For background report generation on the matched Argo CD kinds.
  - apiGroups: ["argoproj.io"]
    resources: ["appprojects", "applications", "applicationsets"]
    verbs: ["get", "list", "watch"]
